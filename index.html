<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Login ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(135deg,#ffd6ec,#ffc2e2,#ffd6ec);
}

.container{
background:rgba(255,255,255,.9);
padding:40px;
border-radius:25px;
box-shadow:0 0 25px rgba(255,105,180,.4);
text-align:center;
width:360px;
position:relative;
z-index:10;
}

h1{
color:#ff4fa3;
margin-bottom:25px;
font-size:35px;
}

p{
color:#777;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
background:#ffe8f3;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:15px;
background:#ff4fa3;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff248d;
transform:scale(1.03);
}

#error{
margin-top:15px;
color:red;
font-weight:bold;
}

/* Herzen */

.heart{
position:absolute;
bottom:-50px;
color:pink;
font-size:25px;
animation:float 8s linear infinite;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<h1>💖 Willkommen 💖</h1>

<p>Bitte einloggen ❤️</p>

<input id="user" placeholder="Benutzername">

<input id="pass" type="password" placeholder="Passwort">

<button onclick="login()">Einloggen</button>

<div id="error"></div>

</div>

<script>

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user==="Melli19" && pass==="melli1807!"){

window.location.href="birthday.html";

}else{

document.getElementById("error").innerHTML="❤️ Falscher Benutzername oder Passwort ❤️";

}

}

// Fliegende Herzen

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

},250);

</script>

</body>
</html>
